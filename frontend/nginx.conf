server {
    listen 80;

    # Sert les fichiers statiques depuis le répertoire html
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy inverse : toutes les requêtes /api/* sont transmises au back-end
    # Le navigateur ne connaît pas l'adresse du back-end ; Nginx fait le relais côté serveur,
    # ce qui évite les problèmes CORS et centralise le point d'entrée sur le port 80.
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
